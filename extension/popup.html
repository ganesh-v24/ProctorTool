<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 260px; padding: 16px; font-family: sans-serif; }
    h3 { margin: 0 0 12px; color: #333; }
    .status { padding: 8px 12px; border-radius: 6px; font-weight: 600; margin-bottom: 12px; }
    .active { background: #d4edda; color: #155724; }
    .inactive { background: #f8d7da; color: #721c24; }
    button { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .start { background: #28a745; color: white; }
    .end { background: #dc3545; color: white; }
    .log { margin-top: 12px; font-size: 12px; color: #555; max-height: 80px; overflow-y: auto; }
  </style>
</head>
<body>
  <h3>Aankh v2 Proctor</h3>
  <div id="status" class="status inactive">Exam Inactive</div>
  <button id="toggleBtn" class="start">Start Proctoring</button>
  <div id="log" class="log"></div>
  <script src="popup.js"></script>
</body>
</html>
